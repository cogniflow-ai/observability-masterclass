name: Build DAG UI - macOS

# When this runs:
#   * Push a tag matching dag-v*.*.*  (e.g. dag-v1.0.0) — produces a release-ready build.
#   * Manual trigger from the Actions tab — for ad-hoc test builds.
#
# What it does:
#   1. Spins up an Apple-silicon macOS-14 runner.
#   2. Installs Python + project deps + PyInstaller.
#   3. Builds Cogniflow UI.app via the existing cogniflow-ui.spec.
#   4. Uploads the .app as a downloadable workflow artifact.
#
# What it intentionally does NOT do (yet):
#   * Code-signing or Apple notarization. The first launch will trigger
#     Gatekeeper's "developer cannot be verified" dialog. Students must
#     right-click the app and choose Open the first time. To skip this,
#     add the APPLE_ID / APPLE_TEAM_ID / APPLE_APP_PASSWORD secrets and
#     wire in `codesign` + `xcrun notarytool` steps after the build job.

on:
  push:
    tags:
      - "dag-v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: dag/cogniflow-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dag/cogniflow-ui/requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean cogniflow-ui.spec

      # The spec emits both the one-folder bundle and the .app wrapper.
      # We zip the .app so GitHub Actions preserves Unix file permissions
      # (the upload-artifact action otherwise loses the executable bit).
      - name: Zip the .app for upload
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Cogniflow UI.app" "Cogniflow-UI-DAG-macOS.zip"
          ls -la

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: cogniflow-ui-dag-macos
          path: dag/cogniflow-ui/dist/Cogniflow-UI-DAG-macOS.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/dag-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dag/cogniflow-ui/dist/Cogniflow-UI-DAG-macOS.zip
          generate_release_notes: true
