<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/observer/app.css?v=9">
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
</head>
<body>

<nav class="navbar">
  <div class="container navbar-inner">
    <a class="navbar-brand" href="/">Cogniflow <span>Observer</span></a>
    {% block navbar_extra %}{% endblock %}
    <div class="navbar-spacer"></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark/light mode">☾</button>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="/static/observer/app.js?v=12"></script>
</body>
</html>
